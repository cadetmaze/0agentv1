version: '3.9'

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - LLM_MODEL=${LLM_MODEL:-claude-sonnet-4-6}
      - IDLE_TIMEOUT_MIN=${IDLE_TIMEOUT_MIN:-30}
      - MAX_CONTAINERS=${MAX_CONTAINERS:-50}
      - CONTAINER_MEMORY_MB=${CONTAINER_MEMORY_MB:-512}
      - AGENT_IMAGE=0agent-sandbox
    volumes:
      # Gateway needs access to Docker socket to spin up user containers
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "15000-15200:15000-15200"  # user container port range
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
